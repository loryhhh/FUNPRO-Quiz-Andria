 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Andria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <div id="start-screen">
        <h2>Bem-vindo ao Quiz!</h2>
        <p>Teste seus conhecimentos respondendo às perguntas.</p>
    
        <button id="start-btn">Iniciar Quiz</button>
    </div>

    <div id="quiz">
        <h2 id="question"></h2>

        <div id="answers"></div>

        <button id="next-btn">Próxima pergunta.</button>
    </div>

    <div id="result" class="hidden">
        <h2>Resultado Final</h2>
        <p id="score"></p>
        <p id="message"></p>

        <button onclick="restartQuiz()">Reiniciar quiz.</button>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
